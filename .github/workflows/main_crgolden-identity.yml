# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - crgolden-identity

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    # Run mutation tests weekly on Monday at 02:00 UTC
    - cron: '0 2 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}
    permissions:
      id-token: write #This is required for requesting the JWT (needed for Azure OIDC in E2E tests)
      contents: read #This is required for actions/checkout

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache dotnet global tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-dotnet-tools-

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Begin Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin `
            /k:"$env:SONAR_PROJECT_KEY" `
            /o:"$env:SONAR_ORGANIZATION" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml,coverage-e2e.xml" `
            /d:sonar.exclusions="**/bin/**,**/obj/**" `
            /d:sonar.scanner.skipJreProvisioning=true

      - name: Build with dotnet
        run: dotnet build --no-incremental --configuration Release

      - name: Run unit tests with coverage
        run: |
          dotnet-coverage collect `
            "dotnet test --project Identity.Tests --no-build --configuration Release -- --filter-trait Category=Unit --report-xunit-trx --report-xunit-trx-filename unit-tests.trx" `
            -f xml -o "coverage.xml" -s "coverage.settings.xml"

      - name: Install SqlPackage
        run: dotnet tool install --global microsoft.sqlpackage

      - name: Deploy E2E test database schema
        env:
          DB_SERVER: ${{ vars.DB_SERVER }}
          DB_USERID: ${{ secrets.DB_USERID }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME_E2E }}
        shell: powershell
        run: |
          $connStr = "Data Source=$env:DB_SERVER;Initial Catalog=$env:DB_NAME;User ID=$env:DB_USERID;Password='$env:DB_PASSWORD';Connect Timeout=30;Encrypt=True;Trust Server Certificate=False;Application Intent=ReadWrite;Multi Subnet Failover=False;Command Timeout=30"
          sqlpackage /Action:Publish /SourceFile:Identity.Data/bin/Release/Identity.Data.dacpac /TargetConnectionString:"$connStr"

      - name: Get Playwright version
        id: playwright-version
        shell: pwsh
        run: |
          $version = (Select-Xml -Path Identity.Tests/Identity.Tests.csproj `
            -XPath '//PackageReference[@Include="Microsoft.Playwright"]/@Version').Node.Value
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh "${{ github.workspace }}\Identity.Tests\bin\Release\net10.0\playwright.ps1" install --with-deps chromium

      - name: Run E2E tests with coverage
        env:
          ASPNETCORE_ENVIRONMENT: CI
          GoogleClientId: ${{ secrets.GOOGLE_CLIENT_ID }}
          GoogleClientSecret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ResendApiToken: ${{ secrets.RESEND_API_TOKEN }}
          GravatarApiSecretKey: ${{ secrets.GRAVATAR_API_SECRET_KEY }}
          ReCAPTCHASiteKey: ${{ secrets.RECAPTCHA_SITE_KEY }}
          ReCAPTCHASecretKey: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          SqlConnectionStringBuilder__DataSource: ${{ vars.DB_SERVER }}
          SqlConnectionStringBuilder__InitialCatalog: ${{ vars.DB_NAME_E2E }}
          SqlConnectionStringBuilder__IntegratedSecurity: false
          SqlConnectionStringBuilder__UserID: ${{ secrets.DB_USERID }}
          SqlConnectionStringBuilder__Password: ${{ secrets.DB_PASSWORD }}
        run: |
          dotnet-coverage collect `
            "dotnet test --project Identity.Tests --no-build --configuration Release -- --filter-trait Category=E2E --report-xunit-trx --report-xunit-trx-filename e2e-tests.trx" `
            -f xml -o "coverage-e2e.xml" -s "coverage.settings.xml"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results
          path: Identity.Tests/bin/Release/net10.0/TestResults/

      - name: Upload Playwright failure artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: identity-playwright-artifacts
          path: Identity.Tests/bin/Release/net10.0/TestResults/PlaywrightArtifacts/
          if-no-files-found: ignore

      - name: Report E2E results
        if: always()
        shell: pwsh
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          PLAYWRIGHT_APPINSIGHTS_CONNECTION_STRING: ${{ vars.PLAYWRIGHT_APPINSIGHTS_CONNECTION_STRING }}
        run: |
          $appName     = 'Identity'
          $suiteName   = 'E2E'
          $resultsDir  = 'Identity.Tests/bin/Release/net10.0/TestResults'
          $artifactDir = 'Identity.Tests/bin/Release/net10.0/TestResults/PlaywrightArtifacts'

          $trx = Get-ChildItem $resultsDir -Filter *.trx | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if (-not $trx) {
              Write-Warning "No TRX file found in $resultsDir - E2E test produced no results. Skipping ADO publish."
              exit 0
          }
          [xml] $xml   = Get-Content $trx.FullName
          $allResults  = @($xml.TestRun.Results.UnitTestResult)
          $failed      = @($allResults | Where-Object { $_.outcome -ne 'Passed' })

          # Azure DevOps
          $testsById = @{}
          foreach ($t in @($xml.TestRun.TestDefinitions.UnitTest)) { $testsById[$t.id] = $t }

          # Azure DevOps — az devops invoke cannot disambiguate duplicate resource names in the ADO
          # manifest (github.com/Azure/azure-devops-cli-extension/issues/1012), so use Invoke-RestMethod
          # with explicit URLs instead.
          $adoHeaders = @{ Authorization = "Basic $([Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$env:AZURE_DEVOPS_EXT_PAT")))" }
          $adoBase    = 'https://dev.azure.com/crgolden/crgolden/_apis/test'
          $adoVer     = 'api-version=7.1'

          function Invoke-Ado {
              param([string]$Method, [string]$Url, [object]$Body)
              Invoke-RestMethod -Method $Method -Uri $Url -Headers $adoHeaders `
                  -ContentType 'application/json' -Body (ConvertTo-Json -InputObject $Body -Depth 20 -Compress)
          }

          $adoResults = foreach ($r in $allResults) {
              $m = $testsById[$r.testId].TestMethod
              @{ testCaseTitle = $r.testName; automatedTestName = "$($m.className).$($m.name)"
                 automatedTestStorage = $appName; automatedTestType = 'Playwright'; outcome = $r.outcome
                 durationInMs = [int][TimeSpan]::Parse($r.duration).TotalMilliseconds
                 errorMessage = $r.Output.ErrorInfo.Message; stackTrace = $r.Output.ErrorInfo.StackTrace
                 state = 'Completed'; comment = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID" }
          }

          $run = Invoke-Ado POST "$adoBase/runs?$adoVer" @{
              name = "$appName $suiteName Playwright - $env:GITHUB_RUN_NUMBER"; automated = $true
              state = 'InProgress'; startedDate = [DateTimeOffset]::Parse($xml.TestRun.Times.start).UtcDateTime.ToString('O')
              comment = "GitHub Actions run $env:GITHUB_RUN_ID" }
          Invoke-Ado POST "$adoBase/runs/$($run.id)/results?$adoVer" @($adoResults) | Out-Null
          Invoke-Ado POST "$adoBase/runs/$($run.id)/attachments?$adoVer" @{
              stream = [Convert]::ToBase64String([IO.File]::ReadAllBytes($trx.FullName))
              fileName = $trx.Name; comment = 'TRX'; attachmentType = 'GeneralAttachment' } | Out-Null
          Invoke-Ado PATCH "$adoBase/runs/$($run.id)?$adoVer" @{
              state = 'Completed'; completedDate = [DateTimeOffset]::UtcNow.ToString('O') } | Out-Null
          Write-Host "Published $($adoResults.Count) results to Azure DevOps run $($run.id)."

          # Azure Monitor
          $cs       = $env:PLAYWRIGHT_APPINSIGHTS_CONNECTION_STRING
          $iKey     = ($cs -split ';' | Where-Object { $_ -like 'InstrumentationKey=*' })  -replace 'InstrumentationKey=', ''
          $endpoint = ($cs -split ';' | Where-Object { $_ -like 'IngestionEndpoint=*' })   -replace 'IngestionEndpoint=', ''
          $common   = @{ app = $appName; suite = $suiteName; repository = $env:GITHUB_REPOSITORY
              branch = $env:GITHUB_REF; sha = $env:GITHUB_SHA; githubRunId = $env:GITHUB_RUN_ID
              githubRunUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
              artifactAvailable = (Test-Path $artifactDir).ToString() }

          function New-Event {
              param([string]$Name, [hashtable]$Props, [hashtable]$Measurements)
              @{ name = 'Microsoft.ApplicationInsights.Event'; time = [DateTimeOffset]::UtcNow.ToString('O'); iKey = $iKey
                 data = @{ baseType = 'EventData'; baseData = @{ ver = 2; name = $Name; properties = $Props; measurements = $Measurements } } }
          }

          $durationMs = ($allResults | ForEach-Object { [TimeSpan]::Parse($_.duration).TotalMilliseconds } | Measure-Object -Sum).Sum
          $runProps = $common.Clone(); $runProps['trxFile'] = $trx.Name; $runProps['outcome'] = if ($failed.Count) { 'Failed' } else { 'Passed' }
          $events = @(New-Event 'PlaywrightTestRun' $runProps @{ total = $allResults.Count; failed = $failed.Count; passed = $allResults.Count - $failed.Count; durationMs = [double]$durationMs })
          $events += $allResults | ForEach-Object {
              $p = $common.Clone(); $p['testName'] = $_.testName; $p['outcome'] = $_.outcome; $p['failed'] = ($_.outcome -ne 'Passed').ToString()
              New-Event 'PlaywrightTestCase' $p @{ durationMs = [double][TimeSpan]::Parse($_.duration).TotalMilliseconds }
          }
          Invoke-RestMethod -Method Post -Uri ($endpoint.TrimEnd('/') + '/v2/track') -ContentType 'application/json' -Body ($events | ConvertTo-Json -Depth 20) | Out-Null
          Write-Host "Sent $($events.Count) telemetry events to Azure Monitor."

      - name: Run load tests
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: |
          dotnet test --project Identity.Tests --no-build --configuration Release -- --filter-trait Category=Load

      - name: dotnet publish
        run: >
          dotnet publish Identity/Identity.csproj
          -c Release
          -r win-x86
          --self-contained false
          -o ${{ github.workspace  }}\publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: .net-app
          path: ${{ github.workspace }}\publish

      - name: Upload dacpac for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: sql-dacpac
          path: Identity.Data/bin/Release/Identity.Data.dacpac

      - name: Upload test binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-binaries
          path: Identity.Tests/bin/Release/net10.0/
          include-hidden-files: true

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v7
        with:
          name: .net-app

      - name: Download dacpac from build job
        uses: actions/download-artifact@v7
        with:
          name: sql-dacpac

      - name: Cache dotnet global tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-deploy
          restore-keys: ${{ runner.os }}-dotnet-tools-

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4533A76F9560447CBA73C7D19BFDC764 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_07B3DB796C7C4D409EFADCB306F23869 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_086A6E19353E42B0AFB0AEE6A7504B9E }}

      - name: Install SqlPackage
        run: dotnet tool install --global microsoft.sqlpackage

      - name: Deploy database
        env:
          DB_SERVER: ${{ vars.DB_SERVER }}
          DB_USERID: ${{ secrets.DB_USERID }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
        run: |
          $connStr = "Data Source=$env:DB_SERVER;Initial Catalog=$env:DB_NAME;User ID=$env:DB_USERID;Password='$env:DB_PASSWORD';Connect Timeout=30;Encrypt=True;Trust Server Certificate=False;Application Intent=ReadWrite;Multi Subnet Failover=False;Command Timeout=30"
          sqlpackage /Action:Publish /SourceFile:Identity.Data.dacpac /TargetConnectionString:"$connStr"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@84a80cfe7e9889f35148ed88c307e6e93bf02578  # v3
        with:
          app-name: 'crgolden-identity'
          slot-name: 'Production'
          package: .

  smoke:
    name: Post-deploy smoke
    runs-on: windows-latest
    needs: [build, deploy]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Download test binaries
        uses: actions/download-artifact@v7
        with:
          name: test-binaries
          path: Identity.Tests/bin/Release/net10.0/

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.build.outputs.playwright-version }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pwsh "${{ github.workspace }}\Identity.Tests\bin\Release\net10.0\playwright.ps1" install --with-deps chromium

      - name: Clear downloaded test results
        run: Remove-Item Identity.Tests/bin/Release/net10.0/TestResults -Recurse -Force -ErrorAction SilentlyContinue

      - name: Run smoke tests
        env:
          CI: true
          SmokeBaseUrl: ${{ vars.SMOKE_BASE_URL }}
          SmokeDataSource: ${{ vars.DB_SERVER }}
          TestEmail: ${{ secrets.TEST_USERNAME }}
          TestPassword: ${{ secrets.TEST_PASSWORD }}
          SqlConnectionStringBuilder__InitialCatalog: ${{ vars.DB_NAME }}
          SqlConnectionStringBuilder__UserID: ${{ secrets.DB_USERID }}
          SqlConnectionStringBuilder__Password: ${{ secrets.DB_PASSWORD }}
        run: |
          $resultsDir = "${{ github.workspace }}\Identity.Tests\bin\Release\net10.0\TestResults"
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          & "${{ github.workspace }}\Identity.Tests\bin\Release\net10.0\Identity.Tests.exe" `
            -trait "Category=Smoke" `
            -trx "$resultsDir\smoke-tests.trx"

      - name: Upload smoke results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: smoke-test-results
          path: Identity.Tests/bin/Release/net10.0/TestResults/

      - name: Upload smoke Playwright failure artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: identity-smoke-playwright-artifacts
          path: Identity.Tests/bin/Release/net10.0/TestResults/PlaywrightArtifacts/
          if-no-files-found: ignore

      - name: Report smoke results
        if: always()
        shell: pwsh
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          PLAYWRIGHT_APPINSIGHTS_CONNECTION_STRING: ${{ vars.PLAYWRIGHT_APPINSIGHTS_CONNECTION_STRING }}
        run: |
          $appName     = 'Identity'
          $suiteName   = 'Smoke'
          $resultsDir  = 'Identity.Tests/bin/Release/net10.0/TestResults'
          $artifactDir = 'Identity.Tests/bin/Release/net10.0/TestResults/PlaywrightArtifacts'

          $trx = Get-ChildItem $resultsDir -Filter *.trx | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if (-not $trx) {
              Write-Warning "No TRX file found in $resultsDir - smoke test produced no results. Skipping ADO publish."
              exit 0
          }
          [xml] $xml   = Get-Content $trx.FullName
          $allResults  = @($xml.TestRun.Results.UnitTestResult)
          $failed      = @($allResults | Where-Object { $_.outcome -ne 'Passed' })

          $testsById  = @{}
          foreach ($t in @($xml.TestRun.TestDefinitions.UnitTest)) { $testsById[$t.id] = $t }
          $adoHeaders = @{ Authorization = "Basic $([Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$env:AZURE_DEVOPS_EXT_PAT")))" }
          $adoBase    = 'https://dev.azure.com/crgolden/crgolden/_apis/test'
          $adoVer     = 'api-version=7.1'

          function Invoke-Ado {
              param([string]$Method, [string]$Url, [object]$Body)
              Invoke-RestMethod -Method $Method -Uri $Url -Headers $adoHeaders `
                  -ContentType 'application/json' -Body (ConvertTo-Json -InputObject $Body -Depth 20 -Compress)
          }

          $adoResults = foreach ($r in $allResults) {
              $m = $testsById[$r.testId].TestMethod
              @{ testCaseTitle = $r.testName; automatedTestName = "$($m.className).$($m.name)"
                 automatedTestStorage = $appName; automatedTestType = 'Playwright'; outcome = $r.outcome
                 durationInMs = [int][TimeSpan]::Parse($r.duration).TotalMilliseconds
                 errorMessage = $r.Output.ErrorInfo.Message; stackTrace = $r.Output.ErrorInfo.StackTrace
                 state = 'Completed'; comment = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID" }
          }

          $run = Invoke-Ado POST "$adoBase/runs?$adoVer" @{
              name = "$appName $suiteName Playwright - $env:GITHUB_RUN_NUMBER"; automated = $true
              state = 'InProgress'; startedDate = [DateTimeOffset]::Parse($xml.TestRun.Times.start).UtcDateTime.ToString('O')
              comment = "GitHub Actions run $env:GITHUB_RUN_ID" }
          Invoke-Ado POST "$adoBase/runs/$($run.id)/results?$adoVer" @($adoResults) | Out-Null
          Invoke-Ado POST "$adoBase/runs/$($run.id)/attachments?$adoVer" @{
              stream = [Convert]::ToBase64String([IO.File]::ReadAllBytes($trx.FullName))
              fileName = $trx.Name; comment = 'TRX'; attachmentType = 'GeneralAttachment' } | Out-Null
          Invoke-Ado PATCH "$adoBase/runs/$($run.id)?$adoVer" @{
              state = 'Completed'; completedDate = [DateTimeOffset]::UtcNow.ToString('O') } | Out-Null
          Write-Host "Published $($adoResults.Count) results to Azure DevOps run $($run.id)."

          $cs       = $env:PLAYWRIGHT_APPINSIGHTS_CONNECTION_STRING
          $iKey     = ($cs -split ';' | Where-Object { $_ -like 'InstrumentationKey=*' })  -replace 'InstrumentationKey=', ''
          $endpoint = ($cs -split ';' | Where-Object { $_ -like 'IngestionEndpoint=*' })   -replace 'IngestionEndpoint=', ''
          $common   = @{ app = $appName; suite = $suiteName; repository = $env:GITHUB_REPOSITORY
              branch = $env:GITHUB_REF; sha = $env:GITHUB_SHA; githubRunId = $env:GITHUB_RUN_ID
              githubRunUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
              artifactAvailable = (Test-Path $artifactDir).ToString() }

          function New-Event {
              param([string]$Name, [hashtable]$Props, [hashtable]$Measurements)
              @{ name = 'Microsoft.ApplicationInsights.Event'; time = [DateTimeOffset]::UtcNow.ToString('O'); iKey = $iKey
                 data = @{ baseType = 'EventData'; baseData = @{ ver = 2; name = $Name; properties = $Props; measurements = $Measurements } } }
          }

          $durationMs = ($allResults | ForEach-Object { [TimeSpan]::Parse($_.duration).TotalMilliseconds } | Measure-Object -Sum).Sum
          $runProps = $common.Clone(); $runProps['trxFile'] = $trx.Name; $runProps['outcome'] = if ($failed.Count) { 'Failed' } else { 'Passed' }
          $events = @(New-Event 'PlaywrightTestRun' $runProps @{ total = $allResults.Count; failed = $failed.Count; passed = $allResults.Count - $failed.Count; durationMs = [double]$durationMs })
          $events += $allResults | ForEach-Object {
              $p = $common.Clone(); $p['testName'] = $_.testName; $p['outcome'] = $_.outcome; $p['failed'] = ($_.outcome -ne 'Passed').ToString()
              New-Event 'PlaywrightTestCase' $p @{ durationMs = [double][TimeSpan]::Parse($_.duration).TotalMilliseconds }
          }
          Invoke-RestMethod -Method Post -Uri ($endpoint.TrimEnd('/') + '/v2/track') -ContentType 'application/json' -Body ($events | ConvertTo-Json -Depth 20) | Out-Null
          Write-Host "Sent $($events.Count) telemetry events to Azure Monitor."

  mutation:
    name: Mutation testing
    runs-on: windows-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache dotnet global tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-dotnet-tools-

      - name: Install dotnet-stryker
        run: dotnet tool install --global dotnet-stryker

      - name: Build solution
        run: dotnet build --configuration Release

      - name: Run Stryker mutation tests
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: dotnet stryker --config-file stryker-config.json

      - name: Upload Stryker report
        uses: actions/upload-artifact@v7
        with:
          name: stryker-report
          path: StrykerOutput/**/*
