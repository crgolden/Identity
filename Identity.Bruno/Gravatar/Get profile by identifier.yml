info:
  name: Get profile by identifier
  type: http
  seq: 1

http:
  method: GET
  url: https://api.gravatar.com/v3/profiles/{{profileIdentifier}}
  headers:
    - name: Authorization
      value: Bearer 8078:gk-oBlUHzzGWt36LkoKUghVBqeWQ6xvJZavI4U5SZ_9NPxWHPUHgvnRU06uzIAaH
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const crypto = require('crypto');
        const email = 'crgolden@msn.com';
        const algorithm = 'sha256';
        const data = email.trim().toLowerCase();
        const encoding = 'hex';
        let hash = crypto.createHash(algorithm);
        hash = hash.update(data);
        hash = hash.digest(encoding);
        bru.setVar('profileIdentifier', hash);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
